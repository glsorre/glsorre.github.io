backend:
  name: git-gateway
  branch: master

media_folder: static/img
public_folder: /img

collections:
  - name: "links"
    label: "Link"
    folder: "blog/links"
    create: true
    slug: "{{year}}{{month}}{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Type"
        name: "type"
        widget: "select"
        options: ["writer", "speaker", "developer", "designer"]
      - label: "Label"
        name: "label"
        widget: "string"
      - label: "anchor"
        name: "anchor"
        widget: "string"
      - label: "Date"
        name: "date"
        widget: "datetime"
      - label: "Description"
        name: "desc"
        widget: "string"